name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare remote directory
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "rm -rf /home/${{ secrets.DEPLOY_USER }}/diag-db-checker && mkdir -p /home/${{ secrets.DEPLOY_USER }}/diag-db-checker"

      - name: Upload source to server
        run: |
          scp -r CMakeLists.txt include src tests data \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/${{ secrets.DEPLOY_USER }}/diag-db-checker/

      - name: Build and test on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /home/${{ secrets.DEPLOY_USER }}/diag-db-checker &&
            cmake -B build &&
            cmake --build build &&
            ctest --test-dir build --output-on-failure
          '

      - name: Run checker on server
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} '
            cd /home/${{ secrets.DEPLOY_USER }}/diag-db-checker &&
            ./build/checker data/sample_ok.json
          '
