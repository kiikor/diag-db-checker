name: C++ CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y cmake g++

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run valid
        run: ./build/checker data/sample_ok.json reports/report_ok.json

      - name: Run warning sample
        run: ./build/checker data/sample_warning.json reports/report_warning.json

      - name: Run invalid
        run: |
          ./build/checker data/sample_bad.json reports/report_bad.json && exit 1 || echo "Expected fail"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report
          path: reports/
